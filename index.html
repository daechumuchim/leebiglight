<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>공정 타이쿤 v11</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: #1a1a1d; color: #e8e8e8;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 16px; user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  .game-container {
    display: flex; gap: 14px;
    background: #2a2a2e; border-radius: 12px; padding: 14px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  .sidebar {
    width: 200px; display: flex; flex-direction: column; gap: 8px;
    max-height: 800px; overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: #1f1f22; }
  .sidebar::-webkit-scrollbar-thumb { background: #4a4a4e; border-radius: 3px; }
  .sidebar-title {
    font-size: 11px; color: #888; text-align: center;
    margin: 4px 0 2px; letter-spacing: 2px; text-transform: uppercase;
  }
  .tool-btn {
    background: #3a3a3e; border: 2px solid #4a4a4e;
    border-radius: 8px; padding: 10px; cursor: pointer;
    color: #e8e8e8; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; font-size: 13px; font-weight: 500;
  }
  .tool-btn:hover { background: #45454a; border-color: #5a5a5e; }
  .tool-btn.active {
    background: #2d4a5d; border-color: #4a90b8;
    box-shadow: 0 0 0 2px rgba(74, 144, 184, 0.3);
  }
  .tool-icon-large { width: 56px; height: 56px; display: block; }
  
  .selector {
    background: #3a3a3e; border: 2px solid #4a4a4e;
    border-radius: 8px; padding: 6px;
    display: flex; align-items: center; gap: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .selector:hover { background: #45454a; }
  .selector.active {
    background: #2d4a5d; border-color: #4a90b8;
    box-shadow: 0 0 0 2px rgba(74, 144, 184, 0.3);
  }
  .selector-content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; font-size: 11px; font-weight: 500; text-align: center;
    min-height: 70px; justify-content: center;
  }
  .selector-content svg { width: 48px; height: 48px; }
  .arrow-btn {
    background: #2a2a2e; border: 1px solid #5a5a5e;
    border-radius: 4px; width: 22px; height: 50px;
    color: #e8e8e8; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .arrow-btn:hover { background: #45454a; }
  
  .info-card {
    background: #1f1f22; border: 1px solid #3a3a3e;
    border-radius: 6px; padding: 8px 10px;
    font-size: 11px; color: #aaa; line-height: 1.6;
  }
  .info-card b { color: #e8e8e8; font-weight: 500; }
  .info-card kbd {
    background: #3a3a3e; border: 1px solid #5a5a5e;
    border-radius: 4px; padding: 1px 5px;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 10px; color: #fff;
  }
  
  .rotate-btn {
    background: #5d4a2d; border: 2px solid #b89a4a;
    border-radius: 8px; padding: 12px;
    cursor: pointer; color: #ffd699; font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s; width: 100%;
  }
  .rotate-btn:hover { background: #6d5a35; }
  .rotate-btn:active { transform: scale(0.96); }
  .rotate-icon { font-size: 18px; display: inline-block; transition: transform 0.2s; }
  
  .action-btn {
    background: #3a3a3e; border: 2px solid #4a4a4e;
    border-radius: 6px; padding: 8px;
    cursor: pointer; color: #e8e8e8; transition: all 0.15s;
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .action-btn:hover { background: #45454a; border-color: #5a5a5e; }
  .action-btn.danger { background: #4a2a2a; border-color: #6a3a3a; color: #ff8a8a; }
  .action-btn.danger:hover { background: #5a3535; }
  .button-row { display: flex; gap: 6px; }
  .button-row .action-btn { flex: 1; }
  
  .canvas-section { display: flex; flex-direction: column; gap: 10px; }
  .canvas-wrap {
    background: #1a1a1d; border: 1px solid #3a3a3e;
    border-radius: 8px; position: relative; overflow: hidden;
  }
  #game-canvas {
    display: block; cursor: crosshair; touch-action: none;
    max-width: 100%; height: auto;
  }
  
  .bottom-panel {
    display: flex; gap: 12px;
    background: #1f1f22; border: 1px solid #3a3a3e;
    border-radius: 8px; padding: 10px 14px;
    align-items: center; flex-wrap: wrap;
  }
  .bottom-info {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #aaa;
  }
  .bottom-info .label { color: #888; font-size: 12px; }
  .bottom-info .tool-val { color: #ffd700; font-weight: 500; }
  .bottom-info .dir-val { color: #ffd700; font-weight: 500; }
  .bottom-info .metal-val { color: #D8D8E0; font-weight: 500; }
  .bottom-info .linker-val { color: #5DD89F; font-weight: 500; }
  .bottom-divider { width: 1px; height: 18px; background: #3a3a3e; }
  
  .toast {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.85); border: 1px solid #5a5a5e;
    border-radius: 6px; padding: 10px 16px;
    font-size: 13px; color: #fff;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
    max-width: 90%; overflow: hidden; text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: #4ab85a; color: #b8f5c8; }
  .toast.error { border-color: #e24b4a; color: #ffb8b8; }
  .toast.warning { border-color: #ffa500; color: #ffd699; }
  
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #2a2a2e; border: 2px solid #4a4a4e;
    border-radius: 12px; padding: 24px;
    min-width: 320px; max-width: 90vw;
    box-shadow: 0 16px 64px rgba(0, 0, 0, 0.6);
  }
  .modal-title {
    font-size: 16px; font-weight: 500; color: #e8e8e8;
    margin-bottom: 16px; text-align: center;
  }
  .modal-options { display: flex; flex-direction: column; gap: 8px; }
  .modal-option {
    background: #3a3a3e; border: 2px solid #4a4a4e;
    border-radius: 8px; padding: 10px 14px;
    cursor: pointer; color: #e8e8e8;
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .modal-option:hover { background: #45454a; border-color: #5a5a5e; }
  .modal-option.selected { background: #2d4a5d; border-color: #4a90b8; }
  .modal-option svg { width: 32px; height: 32px; }
  .modal-close {
    background: #3a3a3e; border: 2px solid #4a4a4e;
    border-radius: 6px; padding: 8px;
    cursor: pointer; color: #e8e8e8; font-size: 12px;
    margin-top: 12px; width: 100%;
  }
  .modal-close:hover { background: #45454a; }
  
  @media (max-width: 950px) {
    body { padding: 6px; align-items: flex-start; }
    .game-container { flex-direction: column; padding: 8px; gap: 8px; width: 100%; }
    .sidebar {
      width: 100%; max-height: none;
      flex-direction: row; flex-wrap: wrap;
      overflow-y: visible; gap: 6px;
    }
    .sidebar-title { width: 100%; margin: 2px 0; }
    .tool-btn { flex: 1 1 calc(33.33% - 4px); min-width: 90px; padding: 6px; font-size: 11px; }
    .tool-icon-large { width: 42px; height: 42px; }
    .selector { flex: 1 1 100%; padding: 4px; }
    .selector-content { min-height: 56px; }
    .selector-content svg { width: 40px; height: 40px; }
    .selector-content span { font-size: 11px; }
    .arrow-btn { height: 44px; }
    .info-card { flex: 1 1 100%; font-size: 11px; padding: 6px 8px; }
    .rotate-btn { padding: 14px; font-size: 16px; }
    .action-btn { flex: 1 1 calc(50% - 3px); }
    .button-row { flex: 1 1 100%; }
    .canvas-section { width: 100%; }
    #game-canvas { width: 100%; height: auto; }
    .bottom-panel { font-size: 12px; padding: 8px 10px; gap: 8px; }
    .bottom-info { font-size: 12px; }
    .bottom-divider { display: none; }
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="sidebar">
    <div class="sidebar-title">도구</div>
    
    <div class="selector active" id="belt-selector">
      <button class="arrow-btn" id="belt-prev">◀</button>
      <div class="selector-content">
        <svg id="belt-icon" viewBox="0 0 80 80"></svg>
        <span id="belt-label">기본 컨베이어 벨트</span>
      </div>
      <button class="arrow-btn" id="belt-next">▶</button>
    </div>
    
    <div class="selector" id="spawner-selector">
      <button class="arrow-btn" id="spawner-prev">◀</button>
      <div class="selector-content">
        <svg id="spawner-icon" viewBox="0 0 80 80"></svg>
        <span id="spawner-label">금속염 공급기</span>
      </div>
      <button class="arrow-btn" id="spawner-next">▶</button>
    </div>
    
    <div class="tool-btn" data-tool="collector">
      <svg class="tool-icon-large" viewBox="0 0 80 80">
        <rect x="10" y="10" width="60" height="60" fill="#4A6A8C" rx="3"/>
        <rect x="14" y="14" width="52" height="52" fill="#3A5570" rx="2"/>
        <circle cx="40" cy="40" r="20" fill="none" stroke="#E8E8E8" stroke-width="2"/>
        <circle cx="40" cy="40" r="13" fill="none" stroke="#E8E8E8" stroke-width="2"/>
        <circle cx="40" cy="40" r="6" fill="#E24B4A"/>
        <circle cx="40" cy="40" r="2" fill="#FFF"/>
      </svg>
      <span>수거기</span>
    </div>
    
    <div class="tool-btn" data-tool="filter">
      <svg class="tool-icon-large" viewBox="0 0 80 80">
        <rect x="10" y="10" width="60" height="60" fill="#5A4080" rx="3"/>
        <rect x="14" y="14" width="52" height="52" fill="#473066" rx="2"/>
        <polygon points="22,22 58,22 46,42 46,58 34,58 34,42" fill="#9070C0" stroke="#5A4080"/>
        <rect x="36" y="58" width="8" height="4" fill="#7050A0"/>
        <text x="40" y="38" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">?</text>
      </svg>
      <span>분류기</span>
    </div>
    
    <div class="tool-btn" data-tool="remove">
      <svg class="tool-icon-large" viewBox="0 0 80 80">
        <rect x="20" y="22" width="40" height="48" fill="#5a3535" rx="2" stroke="#8a4545" stroke-width="2"/>
        <rect x="14" y="18" width="52" height="8" fill="#6a3a3a" rx="2" stroke="#8a4545" stroke-width="2"/>
        <rect x="32" y="12" width="16" height="8" fill="#6a3a3a" rx="2" stroke="#8a4545" stroke-width="2"/>
        <line x1="30" y1="32" x2="30" y2="62" stroke="#ff8a8a" stroke-width="2"/>
        <line x1="40" y1="32" x2="40" y2="62" stroke="#ff8a8a" stroke-width="2"/>
        <line x1="50" y1="32" x2="50" y2="62" stroke="#ff8a8a" stroke-width="2"/>
      </svg>
      <span>삭제</span>
    </div>
    
    <button class="rotate-btn" id="rotate-btn">
      <span class="rotate-icon" id="rotate-icon">↻</span>
      <span>방향 회전</span>
    </button>
    
    <div class="info-card">
      <b>조작법</b><br>
      클릭/터치 - 작동<br>
      드래그 - 연속<br>
      <kbd>R</kbd> 또는 회전 버튼<br>
      분류기 다시 클릭 - 아이템 지정
    </div>
    
    <div class="sidebar-title" style="margin-top: 4px;">저장</div>
    <div class="button-row">
      <button class="action-btn" id="save-btn">💾 저장</button>
      <button class="action-btn" id="load-btn">📂 불러오기</button>
    </div>
    <button class="action-btn danger" id="clear-all" style="margin-top: 4px;">전체 삭제</button>
    <button class="action-btn" id="reset-default">🔄 기본 셋업</button>
  </div>
  
  <div class="canvas-section">
    <div class="canvas-wrap">
      <canvas id="game-canvas" width="720" height="560"></canvas>
      <div class="toast" id="toast"></div>
    </div>
    
    <div class="bottom-panel">
      <div class="bottom-info">
        <span class="label">도구:</span> <span class="tool-val" id="tool-name">기본 컨베이어 벨트</span>
      </div>
      <div class="bottom-divider"></div>
      <div class="bottom-info">
        <span class="label">방향:</span> <span class="dir-val" id="dir-display">→ 동쪽</span>
      </div>
      <div class="bottom-divider"></div>
      <div class="bottom-info">
        ⚪ <span class="label">금속염:</span> <span class="metal-val" id="metal-count">0</span>
      </div>
      <div class="bottom-info">
        🟢 <span class="label">유기 리간드:</span> <span class="linker-val" id="linker-count">0</span>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="filter-modal">
  <div class="modal-box">
    <div class="modal-title">분류기에서 통과시킬 아이템 선택</div>
    <div class="modal-options">
      <div class="modal-option" data-item="none">
        <svg viewBox="0 0 32 32"><rect x="6" y="6" width="20" height="20" fill="#666" rx="2"/><line x1="10" y1="10" x2="22" y2="22" stroke="#ff4444" stroke-width="2"/><line x1="22" y1="10" x2="10" y2="22" stroke="#ff4444" stroke-width="2"/></svg>
        <span>아무것도 통과 안 함 (기본)</span>
      </div>
      <div class="modal-option" data-item="metal_salt">
        <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="10" fill="#D8D8E0" stroke="#7A7A8A" stroke-width="1.5"/><circle cx="13" cy="13" r="3" fill="#F0F0F8"/></svg>
        <span>금속염만 통과</span>
      </div>
      <div class="modal-option" data-item="organic_linker">
        <svg viewBox="0 0 32 32"><polygon points="16,5 26,11 26,21 16,27 6,21 6,11" fill="#5DD89F" stroke="#2A6048" stroke-width="1.5"/><circle cx="16" cy="16" r="3" fill="#A8F0D0"/></svg>
        <span>유기 리간드만 통과</span>
      </div>
    </div>
    <button class="modal-close" id="filter-modal-close">닫기</button>
  </div>
</div>

<input type="file" id="file-input" accept=".json" style="display: none;">

<script>
(function() {
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  
  const GRID_COLS = 18, GRID_ROWS = 14, CELL_SIZE = 40;
  const GRID_WIDTH = GRID_COLS * CELL_SIZE, GRID_HEIGHT = GRID_ROWS * CELL_SIZE;
  const ORIGIN_X = (canvas.width - GRID_WIDTH) / 2;
  const ORIGIN_Y = (canvas.height - GRID_HEIGHT) / 2;
  
  const grid = {};
  const items = [];
  let metalCount = 0, linkerCount = 0;
  
  let currentTool = 'install';
  let currentDir = 'east';
  let hoverCell = null;
  let mouseDown = false;
  let lastSpawnTick = {};
  let splitterToggle = {};
  let tickCounter = 0;
  
  // 컨베이어 벨트 종류
  const beltTypes = [
    { id: 'belt', label: '기본 컨베이어 벨트' },
    { id: 'splitter', label: '3방향 컨베이어 벨트' }
  ];
  let beltTypeIdx = 0;
  
  // 생성기 종류 (v11: 금속염 / 유기 리간드)
  const spawnerTypes = [
    { id: 'metal_salt', label: '금속염 공급기',
      color: '#D8D8E0', highlight: '#F0F0F8', shadow: '#7A7A8A', border: '#3A3A4A',
      shape: 'circle' },
    { id: 'organic_linker', label: '유기 리간드 공급기',
      color: '#5DD89F', highlight: '#A8F0D0', shadow: '#3A9A6B', border: '#2A6048',
      shape: 'hex' }
  ];
  let spawnerTypeIdx = 0;
  
  const dirNames = { north: '↑ 북쪽', east: '→ 동쪽', south: '↓ 남쪽', west: '← 서쪽' };
  const dirOrder = ['north', 'east', 'south', 'west'];
  const dirVectors = {
    north: { dx: 0, dy: -1 }, east: { dx: 1, dy: 0 },
    south: { dx: 0, dy: 1 }, west: { dx: -1, dy: 0 }
  };
  const oppositeDir = { north: 'south', south: 'north', east: 'west', west: 'east' };
  
  function getSplitterOutputs(dir) {
    const inputDir = oppositeDir[dir];
    return dirOrder.filter(d => d !== inputDir);
  }
  
  function drawBelt(cx, cy, size, dir) {
    const p = 1, x = cx + p, y = cy + p, s = size - p * 2;
    ctx.fillStyle = '#C8312A'; ctx.fillRect(x, y, s, s);
    ctx.strokeStyle = '#8B1F1A'; ctx.lineWidth = 1; ctx.strokeRect(x, y, s, s);
    const bi = s * 0.12;
    ctx.fillStyle = '#2A2A2D';
    ctx.fillRect(x + bi, y + bi, s - bi * 2, s - bi * 2);
    ctx.strokeStyle = '#3A3A3D'; ctx.lineWidth = 1;
    const lc = 8, bx = x + bi, by = y + bi, bw = s - bi * 2, bh = s - bi * 2;
    const off = (tickCounter * 0.5) % (bw / lc);
    if (dir === 'east' || dir === 'west') {
      const ao = dir === 'east' ? off : -off;
      for (let i = 0; i < lc + 1; i++) {
        const lx = bx + (bw / lc) * i + ao;
        if (lx >= bx && lx <= bx + bw) {
          ctx.beginPath(); ctx.moveTo(lx, by); ctx.lineTo(lx, by + bh); ctx.stroke();
        }
      }
    } else {
      const ao = dir === 'south' ? off : -off;
      for (let i = 0; i < lc + 1; i++) {
        const ly = by + (bh / lc) * i + ao;
        if (ly >= by && ly <= by + bh) {
          ctx.beginPath(); ctx.moveTo(bx, ly); ctx.lineTo(bx + bw, ly); ctx.stroke();
        }
      }
    }
    drawArrow(x + s / 2, y + s / 2, s * 0.35, dir, '#FFD700', '#8B6914');
  }
  
  function drawSplitter(cx, cy, size, dir) {
    const p = 1, x = cx + p, y = cy + p, s = size - p * 2;
    ctx.fillStyle = '#C8312A'; ctx.fillRect(x, y, s, s);
    ctx.strokeStyle = '#8B1F1A'; ctx.lineWidth = 1; ctx.strokeRect(x, y, s, s);
    const bi = s * 0.12;
    ctx.fillStyle = '#2A2A2D';
    ctx.fillRect(x + bi, y + bi, s - bi * 2, s - bi * 2);
    const cx2 = x + s / 2, cy2 = y + s / 2;
    const inputDir = oppositeDir[dir];
    const outputs = getSplitterOutputs(dir);
    ctx.strokeStyle = '#4A4A4D'; ctx.lineWidth = s * 0.18; ctx.lineCap = 'round';
    const iv = dirVectors[inputDir];
    ctx.beginPath();
    ctx.moveTo(cx2 + iv.dx * s * 0.4, cy2 + iv.dy * s * 0.4);
    ctx.lineTo(cx2, cy2); ctx.stroke();
    for (const od of outputs) {
      const v = dirVectors[od];
      ctx.beginPath(); ctx.moveTo(cx2, cy2);
      ctx.lineTo(cx2 + v.dx * s * 0.4, cy2 + v.dy * s * 0.4); ctx.stroke();
    }
    const ix = cx2 + iv.dx * (s * 0.4), iy = cy2 + iv.dy * (s * 0.4);
    ctx.fillStyle = '#5BB0F0'; ctx.strokeStyle = '#2D6A9D'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(ix, iy, s * 0.07, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#8B6914';
    ctx.beginPath(); ctx.arc(cx2, cy2, s * 0.1, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    for (const od of outputs) {
      const v = dirVectors[od];
      drawArrow(cx2 + v.dx * s * 0.3, cy2 + v.dy * s * 0.3, s * 0.22, od, '#FFD700', '#8B6914');
    }
  }
  
  function drawArrow(acx, acy, sz, dir, fc, sc) {
    ctx.fillStyle = fc; ctx.strokeStyle = sc; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (dir === 'east') {
      ctx.moveTo(acx + sz/2, acy); ctx.lineTo(acx - sz/2, acy - sz/2);
      ctx.lineTo(acx - sz/4, acy); ctx.lineTo(acx - sz/2, acy + sz/2);
    } else if (dir === 'west') {
      ctx.moveTo(acx - sz/2, acy); ctx.lineTo(acx + sz/2, acy - sz/2);
      ctx.lineTo(acx + sz/4, acy); ctx.lineTo(acx + sz/2, acy + sz/2);
    } else if (dir === 'south') {
      ctx.moveTo(acx, acy + sz/2); ctx.lineTo(acx - sz/2, acy - sz/2);
      ctx.lineTo(acx, acy - sz/4); ctx.lineTo(acx + sz/2, acy - sz/2);
    } else {
      ctx.moveTo(acx, acy - sz/2); ctx.lineTo(acx - sz/2, acy + sz/2);
      ctx.lineTo(acx, acy + sz/4); ctx.lineTo(acx + sz/2, acy + sz/2);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  
  function drawSpawner(cx, cy, size, dir, itemType) {
    const p = 2, x = cx + p, y = cy + p, s = size - p * 2;
    ctx.fillStyle = '#8B6F47'; ctx.fillRect(x, y, s, s);
    ctx.strokeStyle = '#5C4630'; ctx.lineWidth = 2; ctx.strokeRect(x, y, s, s);
    ctx.fillStyle = '#6B5437'; ctx.fillRect(x + 4, y + 4, s - 8, s - 8);
    
    const type = spawnerTypes.find(t => t.id === itemType) || spawnerTypes[0];
    // 안쪽에 작은 아이템 미리보기
    const cx2 = x + s / 2, cy2 = y + s / 2;
    if (type.shape === 'circle') {
      const r = s * 0.16;
      ctx.fillStyle = type.color;
      ctx.beginPath(); ctx.arc(cx2, cy2 + 2, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = type.border; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = type.highlight;
      ctx.beginPath(); ctx.arc(cx2 - r * 0.3, cy2 + 2 - r * 0.3, r * 0.4, 0, Math.PI * 2); ctx.fill();
    } else {
      // hex
      const r = s * 0.18;
      ctx.fillStyle = type.color;
      drawHex(cx2, cy2 + 2, r); ctx.fill();
      ctx.strokeStyle = type.border; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = type.highlight;
      ctx.beginPath(); ctx.arc(cx2, cy2 + 2, r * 0.3, 0, Math.PI * 2); ctx.fill();
    }
    
    if (dir) {
      const az = s * 0.25;
      let ax = x + s / 2, ay = y + s / 2;
      if (dir === 'east') ax = x + s - az / 2 - 2;
      else if (dir === 'west') ax = x + az / 2 + 2;
      else if (dir === 'south') ay = y + s - az / 2 - 2;
      else if (dir === 'north') ay = y + az / 2 + 2;
      drawArrow(ax, ay, az, dir, '#FFD700', '#8B6914');
    }
    const pulse = Math.sin(tickCounter * 0.2) * 0.3 + 0.7;
    ctx.strokeStyle = `rgba(255, 215, 0, ${pulse})`;
    ctx.lineWidth = 2; ctx.strokeRect(x + 1, y + 1, s - 2, s - 2);
  }
  
  function drawCollector(cx, cy, size) {
    const p = 2, x = cx + p, y = cy + p, s = size - p * 2;
    ctx.fillStyle = '#4A6A8C'; ctx.fillRect(x, y, s, s);
    ctx.strokeStyle = '#2D4560'; ctx.lineWidth = 2; ctx.strokeRect(x, y, s, s);
    ctx.fillStyle = '#3A5570'; ctx.fillRect(x + 4, y + 4, s - 8, s - 8);
    const ccx = x + s / 2, ccy = y + s / 2;
    ctx.strokeStyle = '#E8E8E8'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(ccx, ccy, s * 0.3, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(ccx, ccy, s * 0.18, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#E24B4A';
    ctx.beginPath(); ctx.arc(ccx, ccy, s * 0.08, 0, Math.PI * 2); ctx.fill();
  }
  
  function drawFilter(cx, cy, size, dir, filterItem) {
    const p = 1, x = cx + p, y = cy + p, s = size - p * 2;
    ctx.fillStyle = '#5A4080'; ctx.fillRect(x, y, s, s);
    ctx.strokeStyle = '#3A2860'; ctx.lineWidth = 1; ctx.strokeRect(x, y, s, s);
    const bi = s * 0.12;
    ctx.fillStyle = '#3A2860'; ctx.fillRect(x + bi, y + bi, s - bi * 2, s - bi * 2);
    const ccx = x + s / 2, ccy = y + s / 2;
    
    if (!filterItem || filterItem === 'none') {
      ctx.strokeStyle = '#FF6666'; ctx.lineWidth = 2;
      const m = s * 0.28;
      ctx.beginPath();
      ctx.moveTo(ccx - m / 1.5, ccy - m / 1.5);
      ctx.lineTo(ccx + m / 1.5, ccy + m / 1.5);
      ctx.moveTo(ccx + m / 1.5, ccy - m / 1.5);
      ctx.lineTo(ccx - m / 1.5, ccy + m / 1.5);
      ctx.stroke();
    } else {
      const type = spawnerTypes.find(t => t.id === filterItem);
      if (type) {
        if (type.shape === 'circle') {
          const r = s * 0.18;
          ctx.fillStyle = type.color;
          ctx.beginPath(); ctx.arc(ccx, ccy, r, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = type.border; ctx.lineWidth = 1.5; ctx.stroke();
        } else {
          const r = s * 0.2;
          ctx.fillStyle = type.color;
          drawHex(ccx, ccy, r); ctx.fill();
          ctx.strokeStyle = type.border; ctx.lineWidth = 1.5; ctx.stroke();
        }
      }
    }
    
    if (dir) {
      const az = s * 0.2;
      let ax = ccx, ay = ccy;
      if (dir === 'east') ax = x + s - az / 2 - 3;
      else if (dir === 'west') ax = x + az / 2 + 3;
      else if (dir === 'south') ay = y + s - az / 2 - 3;
      else if (dir === 'north') ay = y + az / 2 + 3;
      drawArrow(ax, ay, az, dir, '#FFD700', '#8B6914');
    }
  }
  
  function drawHex(cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 2;
      const px = cx + r * Math.cos(a), py = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }
  
  function drawItem(item) {
    const px = ORIGIN_X + (item.x + 0.5) * CELL_SIZE;
    const py = ORIGIN_Y + (item.y + 0.5) * CELL_SIZE;
    const type = spawnerTypes.find(t => t.id === item.type) || spawnerTypes[0];
    
    if (type.shape === 'circle') {
      // 금속염: 결정 원형
      const r = CELL_SIZE * 0.2;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.beginPath(); ctx.arc(px + 1, py + 2, r, 0, Math.PI * 2); ctx.fill();
      const grad = ctx.createRadialGradient(px - r * 0.3, py - r * 0.3, 0, px, py, r);
      grad.addColorStop(0, type.highlight); grad.addColorStop(0.6, type.color); grad.addColorStop(1, type.shadow);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = type.border; ctx.lineWidth = 1; ctx.stroke();
    } else {
      // 유기 리간드: 육각형 (벤젠 고리 느낌)
      const r = CELL_SIZE * 0.22;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      drawHex(px + 1, py + 2, r); ctx.fill();
      ctx.fillStyle = type.color;
      drawHex(px, py, r); ctx.fill();
      ctx.strokeStyle = type.border; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = type.highlight;
      ctx.beginPath(); ctx.arc(px, py, r * 0.35, 0, Math.PI * 2); ctx.fill();
    }
  }
  
  function drawPreview(cx, cy, size, dir, tool, canPlace, subType) {
    if (tool === 'remove') {
      ctx.fillStyle = 'rgba(226, 75, 74, 0.35)';
      ctx.fillRect(cx, cy, size, size);
      ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 2;
      ctx.setLineDash([5, 3]); ctx.strokeRect(cx + 1, cy + 1, size - 2, size - 2);
      ctx.setLineDash([]); ctx.lineWidth = 2.5;
      const m = size * 0.25;
      ctx.beginPath();
      ctx.moveTo(cx + m, cy + m); ctx.lineTo(cx + size - m, cy + size - m);
      ctx.moveTo(cx + size - m, cy + m); ctx.lineTo(cx + m, cy + size - m);
      ctx.stroke();
    } else {
      const color = canPlace ? 'rgba(239, 159, 39, 0.25)' : 'rgba(226, 75, 74, 0.3)';
      const bc = canPlace ? '#FFD700' : '#FF4444';
      ctx.fillStyle = color; ctx.fillRect(cx, cy, size, size);
      if (canPlace) {
        ctx.globalAlpha = 0.65;
        if (tool === 'install') {
          if (subType === 'splitter') drawSplitter(cx, cy, size, dir);
          else drawBelt(cx, cy, size, dir);
        }
        else if (tool === 'spawner') drawSpawner(cx, cy, size, dir, subType);
        else if (tool === 'collector') drawCollector(cx, cy, size);
        else if (tool === 'filter') drawFilter(cx, cy, size, dir, 'none');
        ctx.globalAlpha = 1;
      } else {
        ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 3;
        const m = size * 0.25;
        ctx.beginPath();
        ctx.moveTo(cx + m, cy + m); ctx.lineTo(cx + size - m, cy + size - m);
        ctx.moveTo(cx + size - m, cy + m); ctx.lineTo(cx + m, cy + size - m);
        ctx.stroke();
      }
      ctx.strokeStyle = bc; ctx.lineWidth = 2.5;
      ctx.setLineDash([5, 3]); ctx.strokeRect(cx + 1, cy + 1, size - 2, size - 2);
      ctx.setLineDash([]);
    }
  }
  
  function draw() {
    ctx.fillStyle = '#1a1a1d'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#F5F2E8'; ctx.fillRect(ORIGIN_X, ORIGIN_Y, GRID_WIDTH, GRID_HEIGHT);
    ctx.strokeStyle = '#D3D1C7'; ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_COLS; i++) {
      ctx.beginPath(); ctx.moveTo(ORIGIN_X + i * CELL_SIZE, ORIGIN_Y);
      ctx.lineTo(ORIGIN_X + i * CELL_SIZE, ORIGIN_Y + GRID_HEIGHT); ctx.stroke();
    }
    for (let j = 0; j <= GRID_ROWS; j++) {
      ctx.beginPath(); ctx.moveTo(ORIGIN_X, ORIGIN_Y + j * CELL_SIZE);
      ctx.lineTo(ORIGIN_X + GRID_WIDTH, ORIGIN_Y + j * CELL_SIZE); ctx.stroke();
    }
    ctx.strokeStyle = '#888780'; ctx.lineWidth = 2;
    ctx.strokeRect(ORIGIN_X, ORIGIN_Y, GRID_WIDTH, GRID_HEIGHT);
    
    for (const key in grid) {
      const [col, row] = key.split(',').map(Number);
      const cx = ORIGIN_X + col * CELL_SIZE, cy = ORIGIN_Y + row * CELL_SIZE;
      const cell = grid[key];
      if (cell.type === 'belt') drawBelt(cx, cy, CELL_SIZE, cell.dir);
      else if (cell.type === 'splitter') drawSplitter(cx, cy, CELL_SIZE, cell.dir);
      else if (cell.type === 'spawner') drawSpawner(cx, cy, CELL_SIZE, cell.dir, cell.itemType);
      else if (cell.type === 'collector') drawCollector(cx, cy, CELL_SIZE);
      else if (cell.type === 'filter') drawFilter(cx, cy, CELL_SIZE, cell.dir, cell.filterItem);
    }
    
    for (const item of items) drawItem(item);
    
    if (hoverCell) {
      const cx = ORIGIN_X + hoverCell.col * CELL_SIZE;
      const cy = ORIGIN_Y + hoverCell.row * CELL_SIZE;
      const key = hoverCell.col + ',' + hoverCell.row;
      const existing = grid[key];
      if (currentTool === 'remove') {
        if (existing) drawPreview(cx, cy, CELL_SIZE, null, 'remove', true);
      } else {
        let subType = null;
        if (currentTool === 'install') subType = beltTypes[beltTypeIdx].id;
        else if (currentTool === 'spawner') subType = spawnerTypes[spawnerTypeIdx].id;
        if (existing) drawPreview(cx, cy, CELL_SIZE, currentDir, currentTool, false, subType);
        else {
          let canPlace = true;
          if (currentTool === 'install' && subType === 'belt') {
            canPlace = !wouldFaceOpposite(hoverCell.col, hoverCell.row, currentDir);
          }
          drawPreview(cx, cy, CELL_SIZE, currentDir, currentTool, canPlace, subType);
        }
      }
    }
  }
  
  function wouldFaceOpposite(col, row, dir) {
    const v = dirVectors[dir];
    const fk = (col + v.dx) + ',' + (row + v.dy);
    const front = grid[fk];
    if (front && (front.type === 'belt' || front.type === 'filter') && front.dir === oppositeDir[dir]) return true;
    return false;
  }
  
  function getSpawnersByTargetBelt() {
    const map = {};
    for (const key in grid) {
      const cell = grid[key];
      if (cell.type !== 'spawner' || !cell.dir) continue;
      const [col, row] = key.split(',').map(Number);
      const v = dirVectors[cell.dir];
      const tk = (col + v.dx) + ',' + (row + v.dy);
      if (!grid[tk]) continue;
      if (!map[tk]) map[tk] = [];
      map[tk].push(key);
    }
    return map;
  }
  
  function tickSimulation() {
    tickCounter++;
    const groups = getSpawnersByTargetBelt();
    const offsets = {};
    const baseInt = 40;
    for (const tk in groups) {
      const spawners = groups[tk].sort();
      const stagger = Math.floor(baseInt / spawners.length);
      spawners.forEach((sk, i) => { offsets[sk] = i * stagger; });
    }
    
    for (const key in grid) {
      const cell = grid[key];
      if (cell.type !== 'spawner') continue;
      const lt = lastSpawnTick[key];
      const off = offsets[key] || 0;
      if (lt === undefined) { if (tickCounter < off) continue; }
      else { if (tickCounter - lt < baseInt) continue; }
      const [col, row] = key.split(',').map(Number);
      const has = items.some(it => Math.abs(it.x - col) < 0.6 && Math.abs(it.y - row) < 0.6);
      if (has) continue;
      if (cell.dir) {
        const v = dirVectors[cell.dir];
        const tc = col + v.dx, tr = row + v.dy;
        const near = items.some(it => Math.abs(it.x - tc) < 0.7 && Math.abs(it.y - tr) < 0.7);
        if (near) continue;
      }
      items.push({ x: col, y: row, type: cell.itemType });
      lastSpawnTick[key] = tickCounter;
    }
    
    const speed = 0.04, minGap = 0.55;
    
    for (let i = items.length - 1; i >= 0; i--) {
      const item = items[i];
      const col = Math.round(item.x), row = Math.round(item.y);
      const key = col + ',' + row;
      const cell = grid[key];
      const dtc = Math.abs(item.x - col) + Math.abs(item.y - row);
      const atCenter = dtc < speed * 1.5;
      
      if (cell && cell.type === 'collector' && atCenter) {
        items.splice(i, 1);
        if (item.type === 'metal_salt') {
          metalCount++;
          document.getElementById('metal-count').textContent = metalCount;
        } else if (item.type === 'organic_linker') {
          linkerCount++;
          document.getElementById('linker-count').textContent = linkerCount;
        }
        continue;
      }
      
      if (!cell) { items.splice(i, 1); continue; }
      
      let dir = null;
      if (cell.type === 'belt') dir = cell.dir;
      else if (cell.type === 'spawner') dir = cell.dir;
      else if (cell.type === 'filter') {
        if (cell.filterItem === item.type) dir = cell.dir;
        else { item.x = col; item.y = row; continue; }
      } else if (cell.type === 'splitter') {
        const outputs = getSplitterOutputs(cell.dir);
        if (item.lastSplitterKey !== key) {
          const toggle = splitterToggle[key] || 0;
          const valid = outputs.filter(d => {
            const v = dirVectors[d];
            const nk = (col + v.dx) + ',' + (row + v.dy);
            const n = grid[nk];
            if (!n) return false;
            if (n.type === 'belt' && n.dir === oppositeDir[d]) return false;
            if (n.type === 'filter' && n.dir === oppositeDir[d]) return false;
            return true;
          });
          if (valid.length === 0) { item.x = col; item.y = row; continue; }
          item.chosenDir = valid[toggle % valid.length];
          splitterToggle[key] = (toggle + 1) % valid.length;
          item.lastSplitterKey = key;
        }
        dir = item.chosenDir;
      }
      
      if (cell && cell.type !== 'splitter' && item.lastSplitterKey) item.lastSplitterKey = null;
      if (!dir) { item.x = col; item.y = row; continue; }
      
      const v = dirVectors[dir];
      const ahead = items.find((other, oi) => {
        if (oi === i) return false;
        const dx = other.x - item.x, dy = other.y - item.y;
        const ad = dx * v.dx + dy * v.dy;
        if (ad <= 0 || ad > minGap) return false;
        const pd = Math.abs(dx * Math.abs(v.dy)) + Math.abs(dy * Math.abs(v.dx));
        return pd < 0.4;
      });
      if (ahead) {
        if (dir === 'east' || dir === 'west') item.y = row; else item.x = col;
        continue;
      }
      
      if (atCenter) {
        const nk = (col + v.dx) + ',' + (row + v.dy);
        const nc = grid[nk];
        if (!nc) { item.x = col; item.y = row; continue; }
        if ((nc.type === 'belt' || nc.type === 'filter') && nc.dir === oppositeDir[dir]) {
          item.x = col; item.y = row; continue;
        }
      }
      
      item.x += v.dx * speed;
      item.y += v.dy * speed;
      if (dir === 'east' || dir === 'west') item.y = row; else item.x = col;
    }
  }
  
  function animate() {
    tickSimulation();
    draw();
    requestAnimationFrame(animate);
  }
  
  function getCellFromPointer(cx, cy) {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width, sy = canvas.height / r.height;
    const mx = (cx - r.left) * sx, my = (cy - r.top) * sy;
    const col = Math.floor((mx - ORIGIN_X) / CELL_SIZE);
    const row = Math.floor((my - ORIGIN_Y) / CELL_SIZE);
    if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return null;
    return { col, row };
  }
  
  function updateDirDisplay() {
    document.getElementById('dir-display').textContent = dirNames[currentDir];
  }
  
  function updateToolName() {
    const m = {
      install: beltTypes[beltTypeIdx].label,
      spawner: spawnerTypes[spawnerTypeIdx].label,
      collector: '수거기', filter: '분류기', remove: '삭제'
    };
    document.getElementById('tool-name').textContent = m[currentTool] || currentTool;
  }
  
  let lastWarn = 0;
  function performAction(cell, fromDrag) {
    if (!cell) return;
    const key = cell.col + ',' + cell.row;
    if (currentTool === 'remove') {
      if (grid[key]) {
        delete grid[key];
        delete lastSpawnTick[key];
        delete splitterToggle[key];
      }
      return;
    }
    if (currentTool === 'filter' && grid[key] && grid[key].type === 'filter') {
      openFilterModal(key);
      return;
    }
    if (grid[key]) {
      if (!fromDrag) showToast('이미 무언가 설치되어 있습니다', 'warning');
      return;
    }
    if (currentTool === 'install') {
      const bt = beltTypes[beltTypeIdx].id;
      if (bt === 'belt') {
        if (wouldFaceOpposite(cell.col, cell.row, currentDir)) {
          const now = Date.now();
          if (now - lastWarn > 500) {
            showToast('⚠ 컨베이어가 서로 마주보면 설치할 수 없습니다', 'error');
            lastWarn = now;
          }
          return;
        }
        grid[key] = { type: 'belt', dir: currentDir };
      } else {
        grid[key] = { type: 'splitter', dir: currentDir };
      }
    } else if (currentTool === 'spawner') {
      grid[key] = { type: 'spawner', dir: currentDir, itemType: spawnerTypes[spawnerTypeIdx].id };
    } else if (currentTool === 'collector') {
      grid[key] = { type: 'collector' };
    } else if (currentTool === 'filter') {
      grid[key] = { type: 'filter', dir: currentDir, filterItem: 'none' };
    }
  }
  
  canvas.addEventListener('mousemove', (e) => {
    hoverCell = getCellFromPointer(e.clientX, e.clientY);
    if (mouseDown && hoverCell) performAction(hoverCell, true);
  });
  canvas.addEventListener('mouseleave', () => { hoverCell = null; mouseDown = false; });
  canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    performAction(getCellFromPointer(e.clientX, e.clientY), false);
  });
  canvas.addEventListener('mouseup', () => { mouseDown = false; });
  
  let touchDrag = false;
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    touchDrag = true;
    const cell = getCellFromPointer(t.clientX, t.clientY);
    hoverCell = cell;
    performAction(cell, false);
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const cell = getCellFromPointer(t.clientX, t.clientY);
    hoverCell = cell;
    if (touchDrag && cell) performAction(cell, true);
  }, { passive: false });
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    touchDrag = false;
    setTimeout(() => { hoverCell = null; }, 50);
  }, { passive: false });
  
  function clearActive() {
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    document.getElementById('belt-selector').classList.remove('active');
    document.getElementById('spawner-selector').classList.remove('active');
  }
  
  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      clearActive(); btn.classList.add('active');
      currentTool = btn.dataset.tool;
      updateToolName();
      canvas.style.cursor = currentTool === 'remove' ? 'not-allowed' : 'crosshair';
    });
  });
  
  document.getElementById('belt-selector').addEventListener('click', (e) => {
    if (e.target.classList.contains('arrow-btn')) return;
    clearActive(); e.currentTarget.classList.add('active');
    currentTool = 'install'; updateToolName();
    canvas.style.cursor = 'crosshair';
  });
  document.getElementById('belt-prev').addEventListener('click', (e) => {
    e.stopPropagation();
    beltTypeIdx = (beltTypeIdx - 1 + beltTypes.length) % beltTypes.length;
    updateBeltUI();
  });
  document.getElementById('belt-next').addEventListener('click', (e) => {
    e.stopPropagation();
    beltTypeIdx = (beltTypeIdx + 1) % beltTypes.length;
    updateBeltUI();
  });
  
  function updateBeltUI() {
    const type = beltTypes[beltTypeIdx];
    document.getElementById('belt-label').textContent = type.label;
    const svg = document.getElementById('belt-icon');
    if (type.id === 'belt') {
      svg.innerHTML = `
        <rect x="4" y="20" width="72" height="40" fill="#C8312A" rx="2"/>
        <rect x="8" y="26" width="64" height="28" fill="#2A2A2D"/>
        <line x1="20" y1="26" x2="20" y2="54" stroke="#3A3A3D"/>
        <line x1="32" y1="26" x2="32" y2="54" stroke="#3A3A3D"/>
        <line x1="44" y1="26" x2="44" y2="54" stroke="#3A3A3D"/>
        <line x1="56" y1="26" x2="56" y2="54" stroke="#3A3A3D"/>
        <polygon points="52,40 32,30 36,40 32,50" fill="#FFD700" stroke="#8B6914"/>
      `;
    } else {
      svg.innerHTML = `
        <rect x="4" y="4" width="72" height="72" fill="#C8312A" rx="3"/>
        <rect x="10" y="10" width="60" height="60" fill="#2A2A2D"/>
        <line x1="14" y1="40" x2="40" y2="40" stroke="#4A4A4D" stroke-width="9" stroke-linecap="round"/>
        <line x1="40" y1="40" x2="66" y2="40" stroke="#4A4A4D" stroke-width="9" stroke-linecap="round"/>
        <line x1="40" y1="14" x2="40" y2="40" stroke="#4A4A4D" stroke-width="9" stroke-linecap="round"/>
        <line x1="40" y1="40" x2="40" y2="66" stroke="#4A4A4D" stroke-width="9" stroke-linecap="round"/>
        <circle cx="14" cy="40" r="5" fill="#5BB0F0" stroke="#2D6A9D" stroke-width="1.5"/>
        <circle cx="40" cy="40" r="7" fill="#FFD700" stroke="#8B6914" stroke-width="1.5"/>
        <polygon points="66,40 56,34 58,40 56,46" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
        <polygon points="40,14 34,24 40,22 46,24" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
        <polygon points="40,66 34,56 40,58 46,56" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
      `;
    }
    if (currentTool === 'install') updateToolName();
  }
  
  document.getElementById('spawner-selector').addEventListener('click', (e) => {
    if (e.target.classList.contains('arrow-btn')) return;
    clearActive(); e.currentTarget.classList.add('active');
    currentTool = 'spawner'; updateToolName();
    canvas.style.cursor = 'crosshair';
  });
  document.getElementById('spawner-prev').addEventListener('click', (e) => {
    e.stopPropagation();
    spawnerTypeIdx = (spawnerTypeIdx - 1 + spawnerTypes.length) % spawnerTypes.length;
    updateSpawnerUI();
  });
  document.getElementById('spawner-next').addEventListener('click', (e) => {
    e.stopPropagation();
    spawnerTypeIdx = (spawnerTypeIdx + 1) % spawnerTypes.length;
    updateSpawnerUI();
  });
  
  function updateSpawnerUI() {
    const type = spawnerTypes[spawnerTypeIdx];
    document.getElementById('spawner-label').textContent = type.label;
    const svg = document.getElementById('spawner-icon');
    // 박스 + 안에 아이템 모양 표시
    let innerSvg;
    if (type.shape === 'circle') {
      innerSvg = `<circle cx="40" cy="42" r="11" fill="${type.color}" stroke="${type.border}" stroke-width="1.5"/>
                  <circle cx="36" cy="38" r="3.5" fill="${type.highlight}"/>`;
    } else {
      innerSvg = `<polygon points="40,32 49,37 49,47 40,52 31,47 31,37" fill="${type.color}" stroke="${type.border}" stroke-width="1.5"/>
                  <circle cx="40" cy="42" r="3" fill="${type.highlight}"/>`;
    }
    svg.innerHTML = `
      <rect x="10" y="10" width="60" height="60" fill="#8B6F47" rx="3"/>
      <rect x="14" y="14" width="52" height="52" fill="#6B5437" rx="2"/>
      ${innerSvg}
      <polygon points="56,52 64,56 56,60" fill="#FFD700" stroke="#8B6914" stroke-width="0.5"/>
    `;
    if (currentTool === 'spawner') updateToolName();
  }
  
  function rotateDir() {
    const i = dirOrder.indexOf(currentDir);
    currentDir = dirOrder[(i + 1) % 4];
    updateDirDisplay();
    const icon = document.getElementById('rotate-icon');
    if (icon) {
      icon.style.transform = 'rotate(90deg)';
      setTimeout(() => { icon.style.transform = 'rotate(0deg)'; }, 200);
    }
  }
  window.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') rotateDir();
  });
  document.getElementById('rotate-btn').addEventListener('click', rotateDir);
  
  // 분류기 모달
  let activeFilterKey = null;
  function openFilterModal(key) {
    activeFilterKey = key;
    const cell = grid[key];
    document.querySelectorAll('.modal-option').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.item === (cell.filterItem || 'none'));
    });
    document.getElementById('filter-modal').classList.add('show');
  }
  document.querySelectorAll('.modal-option').forEach(opt => {
    opt.addEventListener('click', () => {
      if (!activeFilterKey) return;
      const cell = grid[activeFilterKey];
      if (cell && cell.type === 'filter') {
        cell.filterItem = opt.dataset.item;
        const names = { none: '아무것도 통과 안 함', metal_salt: '금속염', organic_linker: '유기 리간드' };
        showToast(`분류기 설정: ${names[opt.dataset.item]}`, 'success');
      }
      document.getElementById('filter-modal').classList.remove('show');
      activeFilterKey = null;
    });
  });
  document.getElementById('filter-modal-close').addEventListener('click', () => {
    document.getElementById('filter-modal').classList.remove('show');
    activeFilterKey = null;
  });
  document.getElementById('filter-modal').addEventListener('click', (e) => {
    if (e.target.id === 'filter-modal') {
      document.getElementById('filter-modal').classList.remove('show');
      activeFilterKey = null;
    }
  });
  
  document.getElementById('clear-all').addEventListener('click', () => {
    if (Object.keys(grid).length === 0) return;
    if (confirm('모든 설치물을 삭제하시겠습니까?')) {
      for (const k in grid) delete grid[k];
      items.length = 0;
      metalCount = 0; linkerCount = 0;
      document.getElementById('metal-count').textContent = 0;
      document.getElementById('linker-count').textContent = 0;
      lastSpawnTick = {}; splitterToggle = {};
    }
  });
  
  document.getElementById('reset-default').addEventListener('click', () => {
    setupDefault();
    showToast('기본 셋업으로 초기화!', 'success');
  });
  
  document.getElementById('save-btn').addEventListener('click', () => {
    const data = { version: 11, grid, cols: GRID_COLS, rows: GRID_ROWS, savedAt: new Date().toISOString() };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `공정타이쿤_${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
    showToast('파일로 저장 완료!', 'success');
  });
  
  document.getElementById('load-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.grid) throw new Error('잘못된 형식');
        for (const k in grid) delete grid[k];
        for (const k in d.grid) grid[k] = d.grid[k];
        items.length = 0;
        metalCount = 0; linkerCount = 0;
        document.getElementById('metal-count').textContent = 0;
        document.getElementById('linker-count').textContent = 0;
        lastSpawnTick = {}; splitterToggle = {};
        showToast('불러오기 완료!', 'success');
      } catch (err) {
        showToast('불러오기 실패: 파일 형식 오류', 'error');
      }
    };
    r.readAsText(file);
    e.target.value = '';
  });
  
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.classList.remove('show'); }, 2500);
  }
  
  function setupDefault() {
    for (const k in grid) delete grid[k];
    items.length = 0;
    metalCount = 0; linkerCount = 0;
    document.getElementById('metal-count').textContent = 0;
    document.getElementById('linker-count').textContent = 0;
    lastSpawnTick = {}; splitterToggle = {};
    
    grid['0,1'] = { type: 'spawner', dir: 'east', itemType: 'metal_salt' };
    grid['1,1'] = { type: 'belt', dir: 'east' };
    grid['2,1'] = { type: 'collector' };
  }
  
  setupDefault();
  updateBeltUI();
  updateSpawnerUI();
  updateDirDisplay();
  updateToolName();
  animate();
})();
</script>

</body>
</html>
